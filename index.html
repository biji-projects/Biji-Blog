<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biji-BLOG</title>

<style>
body {
  margin:0;
  font-family: 'Georgia', serif;
  background: linear-gradient(to bottom, #87CEEB, #2c3e50);
  color:#fdf6e3;
  text-align:center;
}

/* TITLE */
.title {
  font-size:60px;
  margin-top:20px;
}

/* PROFILE */
.profile-pic {
  width:100px;
  height:100px;
  border-radius:50%;
  border:3px solid white;
  cursor:pointer;
}

.username {
  font-size:22px;
  margin-top:10px;
  cursor:pointer;
}

/* QUESTIONS */
.questions {
  background:#ffffffcc;
  color:#333;
  width:300px;
  margin:20px auto;
  padding:15px;
  border-radius:12px;
  text-align:left;
}

.questions label {
  font-size:13px;
}

/* NOTEBOOK */
.notebook {
  margin:30px auto;
  width:500px;
  height:320px;
  background:#fdf6e3;
  border-radius:10px;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
  padding:20px;
  overflow:auto;
  color:#333;
}

.page {
  border-bottom:1px dashed #aaa;
  margin-bottom:10px;
}

textarea, input {
  width:80%;
  padding:8px;
  margin:5px;
}

button {
  padding:8px 12px;
  margin:5px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="title">biji-BLOG</div>

<label>
  <img id="profilePic" class="profile-pic" src="https://via.placeholder.com/100">
  <input type="file" hidden onchange="changePic(event)">
</label>

<div id="username" class="username" onclick="editName()">Click to set name</div>

<div class="questions" id="questionsBox"></div>

<h2>📓 Journal</h2>
<textarea id="journalInput" placeholder="Write..."></textarea><br>
<button onclick="addJournal()">Save</button>

<div id="notebook" class="notebook"></div>

<script>
let profile = JSON.parse(localStorage.getItem('profile')||'{}');
let journal = JSON.parse(localStorage.getItem('journal')||'[]');
let answers = JSON.parse(localStorage.getItem('answers')||'{}');
let today = new Date().toDateString();

/* RESET DAILY */
if(answers.date !== today){
  answers = {date:today};
  localStorage.setItem('answers', JSON.stringify(answers));
}

/* QUESTIONS LIST */
const questions = [
"How am I feeling?","Did I smile today?","Am I tired?","Am I motivated?","Did I learn something?",
"Did I help someone?","Am I calm?","Am I stressed?","Did I enjoy today?","Do I feel grateful?",
"Am I confident?","Did I rest enough?","Did I eat well?","Am I proud of myself?","Did I try my best?",
"Do I feel peaceful?","Am I excited?","Did I laugh?","Do I need rest?","Am I hopeful?"
];

function renderQuestions(){
  const box=document.getElementById('questionsBox');
  box.innerHTML='';

  questions.forEach((q,i)=>{
    box.innerHTML+=`
      <label>${q}</label>
      <select onchange="saveAnswer(${i},this.value)">
        <option>--</option>
        <option>Yes</option>
        <option>No</option>
        <option>Maybe</option>
      </select>
    `;
  });
}

function saveAnswer(i,val){
  answers[i]=val;
  localStorage.setItem('answers', JSON.stringify(answers));
}

/* PROFILE */
function changePic(e){
  const file=e.target.files[0];
  const reader=new FileReader();
  reader.onload=()=>{
    profile.pic=reader.result;
    profilePic.src=reader.result;
    saveProfile();
  };
  if(file) reader.readAsDataURL(file);
}

function editName(){
  const name=prompt("Enter your name:");
  if(name){
    profile.name=name;
    username.innerText=name;
    saveProfile();
  }
}

function saveProfile(){
  localStorage.setItem('profile', JSON.stringify(profile));
}

function loadProfile(){
  if(profile.pic) profilePic.src=profile.pic;
  if(profile.name) username.innerText=profile.name;
}

/* JOURNAL */
function addJournal(){
  if(!journalInput.value) return;
  journal.unshift({text:journalInput.value,date:new Date().toLocaleDateString()});
  journalInput.value='';
  localStorage.setItem('journal', JSON.stringify(journal));
  renderJournal();
}

function renderJournal(){
  notebook.innerHTML='';
  journal.forEach(j=>{
    notebook.innerHTML+=`<div class="page">${j.text}<br><small>${j.date}</small></div>`;
  });
}

loadProfile();
renderQuestions();
renderJournal();
</script>

</body>
</html>
