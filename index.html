<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter Shop</title>

<style>
body {
  margin:0;
  font-family: 'Georgia', serif;
  background:#1a1410;
  color:#f3e6c9;
}

h2 {
  font-weight:400;
  letter-spacing:2px;
}

/* SHELF */
.shelf {
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  margin-top:20px;
}

/* ENVELOPE SIDEWAYS */
.envelope {
  width:120px;
  height:80px;
  background:#d8c7a1;
  position:relative;
  transform:rotate(-8deg);
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.6);
  transition:all .3s;
}

.envelope:hover {
  transform:rotate(0deg) scale(1.05);
}

/* FULL SCREEN OPEN */
.envelope.full {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.5);
  width:400px;
  height:250px;
  z-index:999;
}

.flap {
  position:absolute;
  top:0;
  width:100%;
  height:50%;
  background:#c9b28b;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:transform .6s;
}

.envelope.open .flap {
  transform:rotateX(180deg);
}

.letter {
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  bottom:10px;
  background:#f5ecd8;
  color:#3b2f1c;
  padding:15px;
  opacity:0;
  transition:opacity .5s;
  overflow:auto;
}

.envelope.open .letter { opacity:1; }

/* NOTEBOOK */
.notebook {
  width:200px;
  height:120px;
  background:#4b3a24;
  border-radius:5px;
  border-left:8px solid #2e2315;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.6);
}

/* INK STYLE INPUT */
textarea, input {
  width:100%;
  margin:5px 0;
  padding:10px;
  border:none;
  background:#2b2117;
  color:#f3e6c9;
  border-radius:5px;
  font-family: 'Georgia', serif;
}

button {
  background:#7a5c2e;
  border:none;
  padding:10px;
  color:white;
  cursor:pointer;
}

/* POPUP */
.popup {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#3b2f1c;
  padding:20px;
  border-radius:10px;
  display:none;
  box-shadow:0 10px 30px rgba(0,0,0,0.7);
}

</style>
</head>

<body>

<h2>✉️ Letter Shelf</h2>
<textarea id="quoteText" placeholder="Write thy letter..."></textarea>
<input id="quoteSource" placeholder="Origin of words">
<button onclick="addQuote()">Seal Letter</button>

<div class="shelf" id="shelf"></div>

<h2>📓 Old Notebook</h2>
<div class="notebook" onclick="openJournal()">Open Journal</div>
<textarea id="journalInput" style="display:none" placeholder="Write with ink..."></textarea>
<button id="saveJournal" style="display:none" onclick="addJournal()">Save Entry</button>
<div id="journalList"></div>

<h2>⏳ Timed Message</h2>
<input id="popupText" placeholder="Write message">
<input type="datetime-local" id="popupTime">
<button onclick="schedulePopup()">Schedule</button>

<div class="popup" id="popupBox"></div>

<script>
let quotes = JSON.parse(localStorage.getItem('quotes')) || [];
let journal = JSON.parse(localStorage.getItem('journal')) || [];

function renderQuotes(){
  const shelf=document.getElementById('shelf');
  shelf.innerHTML='';

  quotes.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='envelope';

    div.innerHTML=`
      <div class="flap"></div>
      <div class="letter">
        <p><i>"${q.text}"</i></p>
        <small>${q.source}</small><br>
        <small>${q.date}</small>
      </div>
    `;

    div.onclick=()=>{
      div.classList.toggle('full');
      div.classList.toggle('open');
    };

    shelf.appendChild(div);
  });
}

function addQuote(){
  const text=document.getElementById('quoteText').value;
  const source=document.getElementById('quoteSource').value;

  quotes.unshift({text, source, date:new Date().toLocaleDateString()});
  localStorage.setItem('quotes',JSON.stringify(quotes));
  renderQuotes();
}

function openJournal(){
  document.getElementById('journalInput').style.display='block';
  document.getElementById('saveJournal').style.display='block';
}

function addJournal(){
  const text=document.getElementById('journalInput').value;
  journal.unshift({text, date:new Date().toLocaleDateString()});
  localStorage.setItem('journal',JSON.stringify(journal));
  renderJournal();
}

function renderJournal(){
  const div=document.getElementById('journalList');
  div.innerHTML='';
  journal.forEach(j=>{
    div.innerHTML+=`<p>📜 ${j.text} <small>${j.date}</small></p>`;
  });
}

function schedulePopup(){
  const text=document.getElementById('popupText').value;
  const time=new Date(document.getElementById('popupTime').value).getTime();
  const now=Date.now();

  const delay=time-now;

  if(delay>0){
    setTimeout(()=>{
      const box=document.getElementById('popupBox');
      box.innerText=text;
      box.style.display='block';

      setTimeout(()=>box.style.display='none',5000);
    },delay);
  }
}

renderQuotes();
renderJournal();
</script>

</body>
</html>
