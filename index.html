<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biji-BLOG</title>

<style>
body {
  margin:0;
  font-family: 'Georgia', serif;
  background: linear-gradient(to bottom, #87CEEB, #2c3e50);
  color:#fdf6e3;
}

/* HEADER */
.header {
  text-align:center;
  padding:20px 10px 10px;
}

.title {
  font-size:32px;
  letter-spacing:2px;
}

/* PROFILE */
.profile {
  text-align:center;
  margin-bottom:20px;
}

.profile-pic {
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px solid #fff;
  object-fit:cover;
  cursor:pointer;
}

.profile input[type="file"] {
  display:none;
}

.profile-name {
  margin-top:10px;
}

.profile input[type="text"] {
  text-align:center;
}

.profile-box {
  background:#ffffffcc;
  color:#333;
  margin:10px auto;
  padding:10px;
  border-radius:10px;
  width:250px;
}

/* INPUT */
textarea, input, select {
  width:100%;
  margin:6px 0;
  padding:8px;
  border-radius:8px;
  border:none;
  background:#fff;
  color:#333;
}

button {
  background:#6ab04c;
  border:none;
  padding:8px 12px;
  cursor:pointer;
  border-radius:6px;
}

.delete-btn {
  background:#c0392b;
  color:white;
  font-size:10px;
  padding:4px 6px;
  position:absolute;
  top:5px;
  right:5px;
}

/* BOOKSHELF */
.bookshelf {
  background:#6b4f2a;
  padding:20px;
  border-radius:10px;
  margin:10px;
}

.shelf-row {
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.envelope {
  width:120px;
  height:80px;
  background:#f6d8a8;
  border-radius:8px;
  transform:rotate(-6deg);
  cursor:pointer;
  position:relative;
}

.envelope.full {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(1.6);
  width:420px; height:260px;
  z-index:999;
}

.flap {
  position:absolute;
  width:100%; height:50%;
  background:#e8c38c;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:.6s;
}

.envelope.open .flap { transform:rotateX(180deg); }

.letter {
  position:absolute;
  inset:10px;
  background:#fff8e7;
  padding:15px;
  opacity:0;
}

.envelope.open .letter { opacity:1; }

/* NOTEBOOK */
.notebook {
  width:220px;
  height:140px;
  background:#7c5a3a;
  border-radius:6px;
  cursor:pointer;
  margin:10px;
}

.notebook.full {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(1.2);
  width:650px; height:420px;
  background:#fff8e7;
  color:#333;
  padding:20px;
  overflow:auto;
  z-index:999;
}

.page {
  margin-bottom:15px;
  border-bottom:1px dashed #aaa;
  position:relative;
  padding-right:30px;
}

.popup {
  position:fixed;
  bottom:20px; right:20px;
  background:#fff8e7;
  color:#333;
  padding:15px;
  border-radius:12px;
  display:none;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">biji-BLOG</div>
</div>

<div class="profile">
  <label>
    <img id="profilePic" class="profile-pic" src="https://via.placeholder.com/100">
    <input type="file" onchange="changePic(event)">
  </label>

  <input id="username" class="profile-name" placeholder="Your name">

  <div class="profile-box">
    <label>How am I today?</label>
    <select id="mood">
      <option>Happy</option>
      <option>Calm</option>
      <option>Sad</option>
      <option>Motivated</option>
    </select>

    <label>Rate your emotion</label>
    <input type="range" id="emotion" min="1" max="10">
  </div>

  <button onclick="saveProfile()">Save Profile</button>
</div>

<h2>✉️ Letters</h2>
<textarea id="quoteText"></textarea>
<input id="quoteSource">
<button onclick="addQuote()">Add Letter</button>

<div class="bookshelf">
  <div class="shelf-row" id="shelf"></div>
</div>

<h2>📓 Notebook</h2>
<div id="notebook" class="notebook" onclick="toggleNotebook()">📓</div>
<textarea id="journalInput"></textarea>
<button onclick="addJournal()">Save Entry</button>

<h2>⏳ Message</h2>
<input id="popupText">
<input type="datetime-local" id="popupTime">
<button onclick="schedulePopup()">Schedule</button>

<div class="popup" id="popupBox"></div>

<script>
let quotes = JSON.parse(localStorage.getItem('quotes')||'[]');
let journal = JSON.parse(localStorage.getItem('journal')||'[]');
let scheduled = JSON.parse(localStorage.getItem('scheduled')||'[]');
let profile = JSON.parse(localStorage.getItem('profile')||'{}');
let openNB=false;

function saveAll(){
  localStorage.setItem('quotes', JSON.stringify(quotes));
  localStorage.setItem('journal', JSON.stringify(journal));
  localStorage.setItem('scheduled', JSON.stringify(scheduled));
  localStorage.setItem('profile', JSON.stringify(profile));
}

function changePic(e){
  const file=e.target.files[0];
  const reader=new FileReader();
  reader.onload=()=>{
    profile.pic=reader.result;
    document.getElementById('profilePic').src=reader.result;
    saveAll();
  };
  if(file) reader.readAsDataURL(file);
}

function saveProfile(){
  profile.name=username.value;
  profile.mood=mood.value;
  profile.emotion=emotion.value;
  saveAll();
}

function loadProfile(){
  if(profile.pic) profilePic.src=profile.pic;
  if(profile.name) username.value=profile.name;
  if(profile.mood) mood.value=profile.mood;
  if(profile.emotion) emotion.value=profile.emotion;
}

function renderQuotes(){
  shelf.innerHTML='';
  quotes.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='envelope';
    div.innerHTML=`
      <button class="delete-btn" onclick="deleteQuote(event,${i})">X</button>
      <div class="flap"></div>
      <div class="letter"><p>${q.text}</p></div>`;
    div.onclick=()=>{div.classList.toggle('full');div.classList.toggle('open');};
    shelf.appendChild(div);
  });
}

function deleteQuote(e,i){e.stopPropagation();quotes.splice(i,1);saveAll();renderQuotes();}

function addQuote(){
  if(!quoteText.value) return;
  quotes.unshift({text:quoteText.value});
  quoteText.value='';
  saveAll();renderQuotes();
}

function toggleNotebook(){openNB=!openNB;notebook.classList.toggle('full');renderJournal();}

function addJournal(){
  if(!journalInput.value) return;
  journal.unshift({text:journalInput.value,date:Date.now()});
  journalInput.value='';
  saveAll();renderJournal();
}

function renderJournal(){
  if(openNB){
    notebook.innerHTML='';
    journal.forEach((j,i)=>{
      notebook.innerHTML+=`<div class="page">${j.text}<button class="delete-btn" onclick="deleteJournal(event,${i})">X</button></div>`;
    });
  } else notebook.innerHTML='📓';
}

function deleteJournal(e,i){e.stopPropagation();journal.splice(i,1);saveAll();renderJournal();}

function schedulePopup(){
  const t=new Date(popupTime.value).getTime();
  if(!popupText.value||!t) return;
  scheduled.push({text:popupText.value,time:t});
  saveAll();
}

function checkScheduled(){
  const now=Date.now();
  scheduled=scheduled.filter(s=>{
    if(s.time<=now){showPopup(s.text);return false;} return true;
  });
  saveAll();
}

function showPopup(t){
  popupBox.innerText=t;
  popupBox.style.display='block';
  setTimeout(()=>popupBox.style.display='none',5000);
}

setInterval(checkScheduled,1000);

loadProfile();
renderQuotes();
renderJournal();
</script>

</body>
</html>
