<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biji-BLOG</title>

<style>
body {
  margin:0;
  font-family: 'Georgia', serif;
  background: linear-gradient(to bottom, #87CEEB, #2c3e50);
  color:#fdf6e3;
  overflow-x:hidden;
}

/* BUBBLES BACKGROUND */
body::before {
  content:"";
  position:fixed;
  width:100%; height:100%;
  background-image: radial-gradient(#ffffff33 2px, transparent 2px);
  background-size: 60px 60px;
  animation: float 25s linear infinite;
}

@keyframes float {
  from {transform:translateY(0);} 
  to {transform:translateY(-300px);} 
}

.header { text-align:center; padding:20px; }
.title { font-size:56px; }

/* LAYOUT */
.container {
  display:flex;
}

.left-panel {
  width:50%;
  padding:20px;
}

.center-panel {
  width:50%;
}

/* PROFILE */
.profile { text-align:center; }
.profile-pic {
  width:90px; height:90px;
  border-radius:50%;
  border:3px solid white;
  cursor:pointer;
}

.username { cursor:pointer; }

/* MULTIPLE SIDE IMAGES */
.side-gallery {
  position:fixed;
  right:10px;
  top:100px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.side-gallery img {
  width:80px; height:80px;
  border-radius:10px;
  cursor:pointer;
}

/* LETTERS CENTER */
.mailbox {
  max-width:500px;
  margin:auto;
}

.mail {
  background:#f6d8a8;
  margin:10px;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.mail.full {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(1.4);
  width:400px;
  z-index:999;
}

.mail-content { display:none; }
.mail.open .mail-content { display:block; }

.small-input { width:90%; padding:6px; }

/* NOTEBOOK */
.notebook {
  margin-top:20px;
  background:#8b0000;
  padding:10px;
  border-radius:10px;
}

.page-container {
  display:flex;
  overflow:hidden;
}

.page {
  min-width:100%;
  background:#fff8e7;
  color:#222;
  padding:20px;
  font-family: 'Courier New', monospace;
}

.nav-btn {
  margin:5px;
}

</style>
</head>
<body>

<div class="header"><div class="title">biji-BLOG</div></div>

<div class="profile">
<label>
<img id="profilePic" class="profile-pic" src="https://via.placeholder.com/100">
<input type="file" hidden onchange="changePic(event)">
</label>
<div id="username" onclick="editName()">Set Name</div>
</div>

<div class="container">

<div class="left-panel">
<h3>✉️ Add Letter</h3>
<input id="quoteText" class="small-input">
<button onclick="addQuote()">Add</button>

<h3>📓 Journal</h3>
<input id="journalInput" class="small-input">
<button onclick="addJournal()">Save</button>

<div class="notebook">
<button class="nav-btn" onclick="prevPage()">◀</button>
<button class="nav-btn" onclick="nextPage()">▶</button>
<div class="page-container" id="pages"></div>
</div>

</div>

<div class="center-panel">
<h3 style="text-align:center">📬 Letters Received</h3>
<div class="mailbox" id="mailbox"></div>
</div>

</div>

<div class="side-gallery" id="gallery"></div>

<script>
let quotes=JSON.parse(localStorage.getItem('quotes')||'[]');
let journal=JSON.parse(localStorage.getItem('journal')||'[]');
let profile=JSON.parse(localStorage.getItem('profile')||'{}');
let answers=JSON.parse(localStorage.getItem('answers')||'{}');
let gallery=JSON.parse(localStorage.getItem('gallery')||'[]');
let pageIndex=0;
let today=new Date().toDateString();

if(answers.date!==today){answers={date:today};}

const questions=[
"What made you smile today?","What challenged you today?","What are you grateful for?",
"Did you take care of yourself?","What do you need right now?","What inspired you?",
"What are you avoiding?","What made today meaningful?","What are you proud of?",
"What do you want tomorrow to feel like?"
];

function saveAll(){
localStorage.setItem('quotes',JSON.stringify(quotes));
localStorage.setItem('journal',JSON.stringify(journal));
localStorage.setItem('profile',JSON.stringify(profile));
localStorage.setItem('answers',JSON.stringify(answers));
localStorage.setItem('gallery',JSON.stringify(gallery));
}

function renderQuestions(){
mailbox.innerHTML='';
questions.forEach((q,i)=>{
let d=document.createElement('div');
d.className='mail';
d.innerHTML=`<b>Letter ${i+1}</b><p>${q}</p><div class='mail-content'><input class='small-input' placeholder='Reply...' onchange='saveAns(${i},this.value)'></div>`;
d.onclick=()=>{d.classList.toggle('full');d.classList.toggle('open');};
mailbox.appendChild(d);
});
}

function saveAns(i,v){answers[i]=v;saveAll();}

function changePic(e){let r=new FileReader();r.onload=()=>{profile.pic=r.result;profilePic.src=r.result;saveAll();};r.readAsDataURL(e.target.files[0]);}

function editName(){let n=prompt('Name');if(n){profile.name=n;username.innerText=n;saveAll();}}

function renderGallery(){
let g=document.getElementById('gallery');
g.innerHTML='';

gallery.forEach((img,i)=>{
let el=document.createElement('img');
el.src=img;
el.onclick=()=>{
let input=document.createElement('input');
input.type='file';
input.onchange=e=>{
let r=new FileReader();
r.onload=()=>{gallery[i]=r.result;saveAll();renderGallery();};
r.readAsDataURL(e.target.files[0]);
};
input.click();
};
g.appendChild(el);
});

let add=document.createElement('img');
add.src='https://via.placeholder.com/80';
add.onclick=()=>{
let input=document.createElement('input');
input.type='file';
input.onchange=e=>{
let r=new FileReader();
r.onload=()=>{gallery.push(r.result);saveAll();renderGallery();};
r.readAsDataURL(e.target.files[0]);
};
input.click();
};
g.appendChild(add);
}

function addQuote(){if(!quoteText.value)return;quotes.unshift({text:quoteText.value});quoteText.value='';saveAll();}

function addJournal(){if(!journalInput.value)return;journal.unshift({text:journalInput.value});journalInput.value='';saveAll();renderJournal();}

function renderJournal(){
pages.innerHTML='';
journal.forEach(j=>{
pages.innerHTML+=`<div class='page'>${j.text}</div>`;
});
updatePage();
}

function updatePage(){
pages.style.transform=`translateX(-${pageIndex*100}%)`;
pages.style.display='flex';
}

function nextPage(){ if(pageIndex<journal.length-1){pageIndex++; updatePage();}}
function prevPage(){ if(pageIndex>0){pageIndex--; updatePage();}}

function loadProfile(){if(profile.pic)profilePic.src=profile.pic;if(profile.name)username.innerText=profile.name;}

loadProfile();
renderQuestions();
renderJournal();
renderGallery();
</script>

</body>
</html>
