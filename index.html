<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biji-BLOG</title>

<style>
body {
  margin:0;
  font-family: Georgia, serif;
  background: linear-gradient(to bottom, #87CEEB, #2c3e50);
  color:#fdf6e3;
}

/* HEADER */
.header {
  text-align:center;
  padding:20px;
}

.title {
  font-size:48px;
}

/* PROFILE */
.profile { text-align:center; }

.profile-pic {
  width:100px; height:100px;
  border-radius:50%;
  border:3px solid white;
  cursor:pointer;
}

.username {
  font-size:20px;
  margin-top:10px;
  cursor:pointer;
}

/* QUESTIONS */
.questions {
  background:#ffffffcc;
  color:#333;
  max-width:400px;
  margin:20px auto;
  padding:15px;
  border-radius:10px;
}

/* INPUT */
textarea, input, select {
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:6px;
  border:none;
}

button {
  padding:8px;
  margin:5px 0;
  cursor:pointer;
}

/* BOOKSHELF */
.bookshelf {
  background:#6b4f2a;
  margin:20px;
  padding:15px;
  border-radius:10px;
}

.shelf-row { display:flex; flex-wrap:wrap; gap:10px; }

.envelope {
  width:120px; height:80px;
  background:#f6d8a8;
  border-radius:6px;
  cursor:pointer;
  position:relative;
}

.envelope.full {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(1.5);
  width:400px; height:250px;
  z-index:999;
}

.flap {
  position:absolute;
  width:100%; height:50%;
  background:#e8c38c;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:.5s;
}

.envelope.open .flap { transform:rotateX(180deg); }

.letter {
  position:absolute;
  inset:10px;
  background:#fff8e7;
  padding:10px;
  opacity:0;
}

.envelope.open .letter { opacity:1; }

.delete-btn {
  position:absolute;
  top:5px; right:5px;
  background:red;
  color:white;
  font-size:10px;
}

/* NOTEBOOK */
.notebook {
  max-width:600px;
  margin:20px auto;
  background:#fff8e7;
  color:#333;
  padding:20px;
  border-radius:10px;
}

.page {
  border-bottom:1px dashed #aaa;
  margin-bottom:10px;
  position:relative;
}

.popup {
  position:fixed;
  bottom:20px; right:20px;
  background:#fff;
  color:#333;
  padding:10px;
  display:none;
}

</style>
</head>
<body>

<div class="header">
  <div class="title">biji-BLOG</div>
</div>

<div class="profile">
  <label>
    <img id="profilePic" class="profile-pic" src="https://via.placeholder.com/100">
    <input type="file" hidden onchange="changePic(event)">
  </label>
  <div id="username" class="username" onclick="editName()">Set Name</div>
</div>

<div class="questions" id="questionsBox"></div>

<h2 style="text-align:center">✉️ Letters</h2>
<textarea id="quoteText"></textarea>
<button onclick="addQuote()">Add</button>
<div class="bookshelf"><div id="shelf" class="shelf-row"></div></div>

<h2 style="text-align:center">📓 Journal</h2>
<textarea id="journalInput"></textarea>
<button onclick="addJournal()">Save</button>
<div id="notebook" class="notebook"></div>

<h2 style="text-align:center">⏳ Message</h2>
<input id="popupText">
<input type="datetime-local" id="popupTime">
<button onclick="schedulePopup()">Set</button>

<div id="popupBox" class="popup"></div>

<script>
let quotes=JSON.parse(localStorage.getItem('quotes')||'[]');
let journal=JSON.parse(localStorage.getItem('journal')||'[]');
let scheduled=JSON.parse(localStorage.getItem('scheduled')||'[]');
let profile=JSON.parse(localStorage.getItem('profile')||'{}');
let answers=JSON.parse(localStorage.getItem('answers')||'{}');
let today=new Date().toDateString();

if(answers.date!==today){answers={date:today};}

const questions=[...Array(20)].map((_,i)=>`Question ${i+1}`);

function saveAll(){
localStorage.setItem('quotes',JSON.stringify(quotes));
localStorage.setItem('journal',JSON.stringify(journal));
localStorage.setItem('scheduled',JSON.stringify(scheduled));
localStorage.setItem('profile',JSON.stringify(profile));
localStorage.setItem('answers',JSON.stringify(answers));
}

function renderQuestions(){
questionsBox.innerHTML='';
questions.forEach((q,i)=>{
questionsBox.innerHTML+=`<label>${q}</label><select onchange="saveAns(${i},this.value)"><option>--</option><option>Yes</option><option>No</option></select>`;
});
}

function saveAns(i,v){answers[i]=v;saveAll();}

function changePic(e){
let r=new FileReader();
r.onload=()=>{profile.pic=r.result;profilePic.src=r.result;saveAll();};
r.readAsDataURL(e.target.files[0]);
}

function editName(){
let n=prompt('Name');
if(n){profile.name=n;username.innerText=n;saveAll();}
}

function loadProfile(){
if(profile.pic)profilePic.src=profile.pic;
if(profile.name)username.innerText=profile.name;
}

function renderQuotes(){
shelf.innerHTML='';
quotes.forEach((q,i)=>{
let d=document.createElement('div');
d.className='envelope';
d.innerHTML=`<button class='delete-btn' onclick='delQ(event,${i})'>x</button><div class='flap'></div><div class='letter'>${q.text}</div>`;
d.onclick=()=>{d.classList.toggle('full');d.classList.toggle('open');};
shelf.appendChild(d);
});
}

function delQ(e,i){e.stopPropagation();quotes.splice(i,1);saveAll();renderQuotes();}

function addQuote(){if(!quoteText.value)return;quotes.unshift({text:quoteText.value});quoteText.value='';saveAll();renderQuotes();}

function addJournal(){if(!journalInput.value)return;journal.unshift({text:journalInput.value,date:new Date().toLocaleDateString()});journalInput.value='';saveAll();renderJournal();}

function renderJournal(){notebook.innerHTML='';journal.forEach((j,i)=>{notebook.innerHTML+=`<div class='page'>${j.text}<button class='delete-btn' onclick='delJ(event,${i})'>x</button></div>`;});}

function delJ(e,i){e.stopPropagation();journal.splice(i,1);saveAll();renderJournal();}

function schedulePopup(){let t=new Date(popupTime.value).getTime();if(!popupText.value||!t)return;scheduled.push({text:popupText.value,time:t});saveAll();}

function check(){let now=Date.now();scheduled=scheduled.filter(s=>{if(s.time<=now){popupBox.innerText=s.text;popupBox.style.display='block';setTimeout(()=>popupBox.style.display='none',5000);return false;}return true;});saveAll();}

setInterval(check,1000);

loadProfile();renderQuestions();renderQuotes();renderJournal();
</script>

</body>
</html>
