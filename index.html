<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghibli Letter Shop</title>

<style>
body {
  margin:0;
  font-family: 'Georgia', serif;
  background: linear-gradient(#2c3e50, #1a2a33);
  color:#fdf6e3;
  overflow-x:hidden;
}

/* FLOATING PARTICLES */
body::after {
  content:"";
  position:fixed;
  width:100%; height:100%;
  background-image: radial-gradient(#ffffff22 1px, transparent 1px);
  background-size: 40px 40px;
  animation: float 20s linear infinite;
  pointer-events:none;
}

@keyframes float {
  from {transform:translateY(0);} 
  to {transform:translateY(-200px);} 
}

/* SIMPLE INPUT */
textarea, input {
  width:100%;
  margin:6px 0;
  padding:8px;
  border:none;
  border-bottom:1px solid #ccc;
  background:transparent;
  color:#fff;
}

button {
  background:#6ab04c;
  border:none;
  padding:8px 12px;
  cursor:pointer;
}

/* ENVELOPE */
.shelf { display:flex; gap:15px; flex-wrap:wrap; }

.envelope {
  width:130px;
  height:90px;
  background:#f6d8a8;
  border-radius:8px;
  transform:rotate(-6deg);
  cursor:pointer;
  transition:.3s;
}

.envelope.full {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(1.6);
  width:420px; height:260px;
  z-index:999;
}

.flap {
  position:absolute;
  width:100%; height:50%;
  background:#e8c38c;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:.6s;
}

.envelope.open .flap { transform:rotateX(180deg); }

.letter {
  position:absolute;
  inset:10px;
  background:#fff8e7;
  padding:15px;
  opacity:0;
}

.envelope.open .letter { opacity:1; }

/* TYPEWRITER */
.typewriter {
  overflow:hidden;
  white-space:nowrap;
  border-right:2px solid black;
  animation: typing 2s steps(30,end), blink .7s infinite;
}

@keyframes typing {
  from { width:0 }
  to { width:100% }
}

@keyframes blink {
  50% { border-color: transparent }
}

/* NOTEBOOK */
.notebook {
  width:180px;
  height:110px;
  background:#7c5a3a;
  border-radius:6px;
  cursor:pointer;
}

.notebook.full {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(1.3);
  width:600px; height:400px;
  background:#fff8e7;
  color:#333;
  padding:20px;
  overflow:auto;
  z-index:999;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.page {
  margin-bottom:15px;
  border-bottom:1px dashed #aaa;
}

.popup {
  position:fixed;
  bottom:20px; right:20px;
  background:#fff8e7;
  color:#333;
  padding:15px;
  border-radius:12px;
  display:none;
}

</style>
</head>

<body>

<h2>✉️ Letters</h2>
<textarea id="quoteText" placeholder="Write..."></textarea>
<input id="quoteSource" placeholder="Source">
<button onclick="addQuote()">Add</button>

<div class="shelf" id="shelf"></div>

<h2>📓 Notebook</h2>
<div id="notebook" class="notebook" onclick="toggleNotebook()"></div>
<textarea id="journalInput" placeholder="Write..."></textarea>
<button onclick="addJournal()">Save</button>

<h2>⏳ Message</h2>
<input id="popupText">
<input type="datetime-local" id="popupTime">
<button onclick="schedulePopup()">Set</button>

<div class="popup" id="popupBox"></div>

<script>
let quotes = JSON.parse(localStorage.getItem('quotes')) || [];
let journal = JSON.parse(localStorage.getItem('journal')) || [];
let openNB=false;

function renderQuotes(){
  const shelf=document.getElementById('shelf');
  shelf.innerHTML='';

  quotes.forEach(q=>{
    const div=document.createElement('div');
    div.className='envelope';

    div.innerHTML=`
      <div class="flap"></div>
      <div class="letter">
        <p class="typewriter">${q.text}</p>
        <small>${q.source}</small>
      </div>
    `;

    div.onclick=()=>{
      div.classList.toggle('full');
      div.classList.toggle('open');
    };

    shelf.appendChild(div);
  });
}

function addQuote(){
  const text=quoteText.value;
  const source=quoteSource.value;
  quotes.unshift({text,source});
  localStorage.setItem('quotes',JSON.stringify(quotes));
  renderQuotes();
}

function toggleNotebook(){
  const nb=document.getElementById('notebook');
  openNB=!openNB;
  nb.classList.toggle('full');
  renderJournal();
}

function addJournal(){
  const text=journalInput.value;
  journal.unshift({text});
  localStorage.setItem('journal',JSON.stringify(journal));
  renderJournal();
}
