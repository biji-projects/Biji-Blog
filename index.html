<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biji-BLOG</title>

<style>
body {
  margin:0;
  font-family: Georgia, serif;
  background: linear-gradient(to bottom, #87CEEB, #2c3e50);
  color:#fdf6e3;
}

/* HEADER LEFT */
.section-header {
  text-align:left;
  padding:20px;
  font-size:22px;
}

.header { text-align:center; padding:20px; }
.title { font-size:56px; }

/* PROFILE */
.profile { text-align:center; }
.profile-pic {
  width:90px; height:90px;
  border-radius:50%;
  border:3px solid white;
  cursor:pointer;
}
.username { margin-top:10px; cursor:pointer; }

/* QUESTION GRID */
.mailbox {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  max-width:800px;
  margin:20px auto;
}

.mail {
  background:#f6d8a8;
  color:#333;
  padding:10px;
  border-radius:8px;
  position:relative;
  cursor:pointer;
  transition:transform 0.3s;
}

.mail:hover { transform:scale(1.05); }

.mail.full {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(1.5);
  width:400px;
  z-index:999;
}

.mail-content {
  display:none;
  background:#fff8e7;
  padding:10px;
  margin-top:10px;
}

.mail.open .mail-content { display:block; }

/* SMALL INPUT */
.small-input {
  width:90%;
  padding:6px;
  margin-top:5px;
}

/* SIDE BOX (IMAGE) */
.side-box {
  position:fixed;
  top:100px;
  right:20px;
  width:120px;
  height:120px;
  background:#ffffffcc;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.side-box img {
  width:100%; height:100%;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

/* BOOKSHELF */
.bookshelf {
  background:#6b4f2a;
  margin:20px;
  padding:15px;
  border-radius:10px;
}
.shelf-row { display:flex; flex-wrap:wrap; gap:10px; }

.envelope {
  width:120px; height:80px;
  background:#f6d8a8;
  border-radius:6px;
  cursor:pointer;
  position:relative;
}

.envelope.full {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(1.6);
  width:420px; height:260px;
  z-index:999;
}

.flap {
  position:absolute;
  width:100%; height:50%;
  background:#e8c38c;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:.6s;
}
.envelope.open .flap { transform:rotateX(180deg); }

.letter {
  position:absolute;
  inset:10px;
  background:#fff;
  padding:10px;
  opacity:0;
}
.envelope.open .letter { opacity:1; }

.delete-btn {
  position:absolute;
  top:5px; right:5px;
  background:red;
  color:white;
  font-size:10px;
}

/* NOTEBOOK */
.notebook {
  width:500px;
  height:300px;
  margin:20px auto;
  perspective:1200px;
}
.book { width:100%; height:100%; position:relative; }
.page {
  width:100%;
  height:100%;
  background:#fff8e7;
  position:absolute;
  top:0;
  left:0;
  padding:20px;
  box-shadow:0 8px 30px rgba(0,0,0,0.5);
  transform-origin:left;
  transition:transform 0.7s;
}
.page.turn { transform:rotateY(-180deg); }

.popup {
  position:fixed;
  bottom:20px; right:20px;
  background:#fff;
  color:#333;
  padding:12px;
  border-radius:10px;
  display:none;
}

</style>
</head>

<body>

<div class="header"><div class="title">biji-BLOG</div></div>

<div class="profile">
<label>
<img id="profilePic" class="profile-pic" src="https://via.placeholder.com/100">
<input type="file" hidden onchange="changePic(event)">
</label>
<div id="username" class="username" onclick="editName()">Set Name</div>
</div>

<div class="section-header">📬 Letters Received</div>
<div class="mailbox" id="mailbox"></div>

<div class="section-header">✉️ Stored Letters</div>
<input id="quoteText" class="small-input">
<button onclick="addQuote()">Add</button>
<div class="bookshelf"><div id="shelf" class="shelf-row"></div></div>

<div class="section-header">📓 Journal</div>
<input id="journalInput" class="small-input">
<button onclick="addJournal()">Save</button>
<div class="notebook"><div id="book" class="book"></div></div>

<div class="section-header">⏳ Messages</div>
<input id="popupText" class="small-input">
<input type="datetime-local" id="popupTime" class="small-input">
<button onclick="schedulePopup()">Set</button>

<div class="side-box">
<label>
<img id="sideImg" src="https://via.placeholder.com/120">
<input type="file" hidden onchange="changeSide(event)">
</label>
</div>

<div id="popupBox" class="popup"></div>

<script>
let quotes=JSON.parse(localStorage.getItem('quotes')||'[]');
let journal=JSON.parse(localStorage.getItem('journal')||'[]');
let scheduled=JSON.parse(localStorage.getItem('scheduled')||'[]');
let profile=JSON.parse(localStorage.getItem('profile')||'{}');
let answers=JSON.parse(localStorage.getItem('answers')||'{}');
let side=localStorage.getItem('sideImg');
let today=new Date().toDateString();

if(answers.date!==today){answers={date:today};}

const questions=[...Array(10)].map((_,i)=>`Letter prompt ${i+1}`);

function saveAll(){
localStorage.setItem('quotes',JSON.stringify(quotes));
localStorage.setItem('journal',JSON.stringify(journal));
localStorage.setItem('scheduled',JSON.stringify(scheduled));
localStorage.setItem('profile',JSON.stringify(profile));
localStorage.setItem('answers',JSON.stringify(answers));
}

function renderQuestions(){
mailbox.innerHTML='';
questions.forEach((q,i)=>{
let d=document.createElement('div');
d.className='mail';
d.innerHTML=`<b>Letter ${i+1}</b><p>${q}</p><div class='mail-content'><input class='small-input' placeholder='Reply...' onchange='saveAns(${i},this.value)'></div>`;
d.onclick=()=>{d.classList.toggle('full');d.classList.toggle('open');};
mailbox.appendChild(d);
});
}

function saveAns(i,v){answers[i]=v;saveAll();}

function changePic(e){let r=new FileReader();r.onload=()=>{profile.pic=r.result;profilePic.src=r.result;saveAll();};r.readAsDataURL(e.target.files[0]);}
function changeSide(e){let r=new FileReader();r.onload=()=>{localStorage.setItem('sideImg',r.result);sideImg.src=r.result;};r.readAsDataURL(e.target.files[0]);}

function editName(){let n=prompt('Name');if(n){profile.name=n;username.innerText=n;saveAll();}}
function loadProfile(){if(profile.pic)profilePic.src=profile.pic;if(profile.name)username.innerText=profile.name;if(side)sideImg.src=side;}

function renderQuotes(){
shelf.innerHTML='';
quotes.forEach((q,i)=>{
let d=document.createElement('div');
d.className='envelope';
d.innerHTML=`<button class='delete-btn' onclick='delQ(event,${i})'>x</button><div class='flap'></div><div class='letter'>${q.text}</div>`;
d.onclick=()=>{d.classList.toggle('full');d.classList.toggle('open');};
shelf.appendChild(d);
});
}

function delQ(e,i){e.stopPropagation();quotes.splice(i,1);saveAll();renderQuotes();}
function addQuote(){if(!quoteText.value)return;quotes.unshift({text:quoteText.value});quoteText.value='';saveAll();renderQuotes();}

function addJournal(){if(!journalInput.value)return;journal.unshift({text:journalInput.value});journalInput.value='';saveAll();renderJournal();}

function renderJournal(){
book.innerHTML='';
journal.forEach((j,i)=>{
book.innerHTML+=`<div class='page' onclick='this.classList.toggle("turn")'>${j.text}<button class='delete-btn' onclick='delJ(event,${i})'>x</button></div>`;
});
}

function delJ(e,i){e.stopPropagation();journal.splice(i,1);saveAll();renderJournal();}

function schedulePopup(){let t=new Date(popupTime.value).getTime();if(!popupText.value||!t)return;scheduled.push({text:popupText.value,time:t});saveAll();}

function check(){let now=Date.now();scheduled=scheduled.filter(s=>{if(s.time<=now){popupBox.innerText=s.text;popupBox.style.display='block';setTimeout(()=>popupBox.style.display='none',5000);return false;}return true;});saveAll();}

setInterval(check,1000);

loadProfile();renderQuestions();renderQuotes();renderJournal();
</script>

</body>
</html>
