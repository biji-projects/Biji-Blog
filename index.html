<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghibli Letter Shop</title>

<style>
body {
  margin:0;
  font-family: 'Georgia', serif;
  background: linear-gradient(to bottom, #87CEEB, #2c3e50);
  color:#fdf6e3;
}

/* FLOATING PARTICLES */
body::after {
  content:"";
  position:fixed;
  width:100%; height:100%;
  background-image: radial-gradient(#ffffff33 1px, transparent 1px);
  background-size: 40px 40px;
  animation: float 20s linear infinite;
  pointer-events:none;
}

@keyframes float {
  from {transform:translateY(0);} 
  to {transform:translateY(-200px);} 
}

/* INPUT */
textarea, input {
  width:100%;
  margin:6px 0;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#fff;
  color:#333;
}

button {
  background:#6ab04c;
  border:none;
  padding:8px 12px;
  cursor:pointer;
  border-radius:6px;
}

/* ENVELOPES */
.shelf { display:flex; gap:15px; flex-wrap:wrap; }
.envelope {
  width:130px;
  height:90px;
  background:#f6d8a8;
  border-radius:8px;
  transform:rotate(-6deg);
  cursor:pointer;
}

.envelope.full {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(1.6);
  width:420px; height:260px;
  z-index:999;
}

.flap {
  position:absolute;
  width:100%; height:50%;
  background:#e8c38c;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:.6s;
}

.envelope.open .flap { transform:rotateX(180deg); }

.letter {
  position:absolute;
  inset:10px;
  background:#fff8e7;
  padding:15px;
  opacity:0;
}

.envelope.open .letter { opacity:1; }

/* TYPEWRITER */
.typewriter {
  overflow:hidden;
  white-space:nowrap;
  border-right:2px solid black;
  animation: typing 2s steps(30,end), blink .7s infinite;
}

@keyframes typing {
  from { width:0 }
  to { width:100% }
}

@keyframes blink {
  50% { border-color: transparent }
}

/* NOTEBOOK */
.notebook {
  width:220px;
  height:140px;
  background:#7c5a3a;
  border-radius:6px;
  cursor:pointer;
  position:relative;
}

.notebook.full {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(1.2);
  width:650px; height:420px;
  background:#fff8e7;
  color:#333;
  padding:20px;
  overflow:hidden;
  z-index:999;
}

/* PAGES */
.page {
  position:absolute;
  width:90%;
  height:85%;
  background:#fffdf5;
  left:5%;
  top:5%;
  padding:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transform-origin:left;
  transition:transform 0.6s;
}

.page.turn {
  transform:rotateY(-180deg);
}

/* BOOKMARK */
.bookmark {
  position:absolute;
  top:0;
  right:40px;
  width:10px;
  height:60px;
  background:red;
}

/* INK & QUILL */
.ink {
  position:absolute;
  bottom:10px;
  right:10px;
  width:30px;
  height:30px;
  background:black;
  border-radius:50%;
}

.quill {
  position:absolute;
  bottom:40px;
  right:20px;
  width:2px;
  height:60px;
  background:white;
  transform:rotate(-20deg);
}

.popup {
  position:fixed;
  bottom:20px; right:20px;
  background:#fff8e7;
  color:#333;
  padding:15px;
  border-radius:12px;
  display:none;
}

</style>
</head>

<body>

<h2>✉️ Letters</h2>
<textarea id="quoteText"></textarea>
<input id="quoteSource">
<button onclick="addQuote()">Add</button>
<div class="shelf" id="shelf"></div>

<h2>📓 Notebook</h2>
<div id="notebook" class="notebook" onclick="toggleNotebook()"></div>
<textarea id="journalInput"></textarea>
<button onclick="addJournal()">Save</button>

<h2>⏳ Message</h2>
<input id="popupText">
<input type="datetime-local" id="popupTime">
<button onclick="schedulePopup()">Set</button>

<div class="popup" id="popupBox"></div>

<script>
let quotes = JSON.parse(localStorage.getItem('quotes')) || [];
let journal = JSON.parse(localStorage.getItem('journal')) || [];
let openNB=false;
let currentPage=0;

function renderQuotes(){
  shelf.innerHTML='';
  quotes.forEach(q=>{
    const div=document.createElement('div');
    div.className='envelope';
    div.innerHTML=`<div class="flap"></div><div class="letter"><p class="typewriter">${q.text}</p></div>`;
    div.onclick=()=>{
      div.classList.toggle('full');
      div.classList.toggle('open');
    };
    shelf.appendChild(div);
  });
}

function addQuote(){
  quotes.unshift({text:quoteText.value});
  localStorage.setItem('quotes',JSON.stringify(quotes));
  renderQuotes();
}

function toggleNotebook(){
  openNB=!openNB;
  notebook.classList.toggle('full');
  renderJournal();
}

function addJournal(){
  journal.unshift({text:journalInput.value});
  localStorage.setItem('journal',JSON.stringify(journal));
  renderJournal();
}

function renderJournal(){
  if(openNB){
    notebook.innerHTML='<div class="bookmark"></div><div class="ink"></div><div class="quill"></div>';

    journal.forEach((j,i)=>{
      notebook.innerHTML+=`<div class="page" onclick="turnPage(this)">${j.text}</div>`;
    });
  } else {
    notebook.innerHTML='📓';
  }
}

function turnPage(el){
  el.classList.toggle('turn');
}

function schedulePopup(){
  const delay=new Date(popupTime.value).getTime()-Date.now();
  if(delay>0){
    setTimeout(()=>{
      popupBox.innerText=popupText.value;
      popupBox.style.display='block';
      setTimeout(()=>popupBox.style.display='none',5000);
    },delay);
  }
}

renderQuotes();
renderJournal();
</script>

</body>
</html>
