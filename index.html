<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghibli Letter Shop</title>

<style>
body {
  margin:0;
  font-family: 'Georgia', serif;
  background: linear-gradient(#2c3e50, #1a2a33);
  color:#fdf6e3;
}

h2 { font-weight:300; }

/* SHELF */
.shelf {
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

/* ENVELOPE */
.envelope {
  width:130px;
  height:90px;
  background:#f6d8a8;
  border-radius:8px;
  transform:rotate(-6deg);
  cursor:pointer;
  box-shadow:0 6px 15px rgba(0,0,0,0.4);
  transition:all .3s;
}

.envelope:hover { transform:scale(1.05); }

.envelope.full {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.6);
  width:420px;
  height:260px;
  z-index:999;
}

.flap {
  position:absolute;
  width:100%;
  height:50%;
  background:#e8c38c;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:.6s;
}

.envelope.open .flap { transform:rotateX(180deg); }

.letter {
  position:absolute;
  inset:10px;
  background:#fff8e7;
  color:#3a2f1d;
  padding:15px;
  opacity:0;
  transition:.5s;
  overflow:auto;
}

.envelope.open .letter { opacity:1; }

/* NOTEBOOK */
.notebook {
  width:180px;
  height:110px;
  background:#7c5a3a;
  border-radius:6px;
  box-shadow:0 5px 15px rgba(0,0,0,0.5);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* FULL NOTEBOOK VIEW */
.notebook.full {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.4);
  width:500px;
  height:350px;
  background:#fff8e7;
  color:#333;
  padding:20px;
  overflow:auto;
  z-index:999;
}

.page {
  border-bottom:1px dashed #ccc;
  margin-bottom:10px;
  padding-bottom:10px;
}

textarea, input {
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:6px;
  border:none;
  background:#2a3a44;
  color:white;
}

button {
  background:#6ab04c;
  border:none;
  padding:10px;
  color:white;
  cursor:pointer;
}

.popup {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#fff8e7;
  color:#333;
  padding:15px;
  border-radius:12px;
  display:none;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

</style>
</head>

<body>

<h2>✉️ Letters</h2>
<textarea id="quoteText" placeholder="Write a gentle thought..."></textarea>
<input id="quoteSource" placeholder="Where it came from">
<button onclick="addQuote()">Store Letter</button>

<div class="shelf" id="shelf"></div>

<h2>📓 Notebook</h2>
<div id="notebook" class="notebook" onclick="toggleNotebook()">Open</div>
<textarea id="journalInput" placeholder="Write something you're grateful for..."></textarea>
<button onclick="addJournal()">Save</button>

<h2>⏳ Message</h2>
<input id="popupText" placeholder="Message">
<input type="datetime-local" id="popupTime">
<button onclick="schedulePopup()">Schedule</button>

<div class="popup" id="popupBox"></div>

<script>
let quotes = JSON.parse(localStorage.getItem('quotes')) || [];
let journal = JSON.parse(localStorage.getItem('journal')) || [];
let notebookOpen = false;

function renderQuotes(){
  const shelf=document.getElementById('shelf');
  shelf.innerHTML='';

  quotes.forEach(q=>{
    const div=document.createElement('div');
    div.className='envelope';

    div.innerHTML=`
      <div class="flap"></div>
      <div class="letter">
        <p><i>${q.text}</i></p>
        <small>${q.source}</small><br>
        <small>${q.date}</small>
      </div>
    `;

    div.onclick=()=>{
      div.classList.toggle('full');
      div.classList.toggle('open');
    };

    shelf.appendChild(div);
  });
}

function addQuote(){
  const text=document.getElementById('quoteText').value;
  const source=document.getElementById('quoteSource').value;

  quotes.unshift({text, source, date:new Date().toLocaleDateString()});
  localStorage.setItem('quotes',JSON.stringify(quotes));
  renderQuotes();
}

function toggleNotebook(){
  const nb=document.getElementById('notebook');
  notebookOpen=!notebookOpen;
  nb.classList.toggle('full');
  renderJournal();
}

function addJournal(){
  const text=document.getElementById('journalInput').value;
  journal.unshift({text, date:new Date().toLocaleDateString()});
  localStorage.setItem('journal',JSON.stringify(journal));
  renderJournal();
}

function renderJournal(){
  const nb=document.getElementById('notebook');

  if(notebookOpen){
    nb.innerHTML='';
    journal.forEach(j=>{
      nb.innerHTML+=`<div class="page">📖 ${j.text}<br><small>${j.date}</small></div>`;
    });
  } else {
    nb.innerHTML='Open';
  }
}

function schedulePopup(){
  const text=document.getElementById('popupText').value;
  const time=new Date(document.getElementById('popupTime').value).getTime();
  const delay=time-Date.now();

  if(delay>0){
    setTimeout(()=>{
      const box=document.getElementById('popupBox');
      box.innerText=text;
      box.style.display='block';
      setTimeout(()=>box.style.display='none',5000);
    },delay);
  }
}

renderQuotes();
renderJournal();
</script>

</body>
</html>
