<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Quotes & Journal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
      margin: 0;
      padding: 20px;
    }
    h2 { margin-top: 30px; }
    .card {
      background: white;
      border-radius: 20px;
      padding: 15px;
      margin: 10px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
    }
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }
    img { max-width: 100%; border-radius: 10px; margin-top: 10px; }
    #popup {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: black;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>
<body>

<div id="popup"></div>

<h2>Add Quote</h2>
<div class="card">
  <textarea id="quoteText" placeholder="Your favorite quote..."></textarea>
  <input id="quoteSource" placeholder="Where did you get it?" />
  <input id="quoteImage" placeholder="Image URL (optional)" />
  <button onclick="addQuote()">Save Quote</button>
</div>

<h2>Your Quotes</h2>
<div id="quotes"></div>

<h2>Gratitude Journal</h2>
<div class="card">
  <textarea id="journalText" placeholder="What are you grateful for?"></textarea>
  <button onclick="addJournal()">Add Entry</button>
</div>
<div id="journal"></div>

<h2>Popup Message</h2>
<div class="card">
  <input id="popupInput" placeholder="Type a message..." />
  <button onclick="showPopup()">Show Popup</button>
</div>

<script>
  let quotes = JSON.parse(localStorage.getItem('quotes')) || [];
  let journal = JSON.parse(localStorage.getItem('journal')) || [];

  function renderQuotes() {
    const container = document.getElementById('quotes');
    container.innerHTML = '';
    quotes.forEach(q => {
      container.innerHTML += `
        <div class="card">
          <p><i>"${q.text}"</i></p>
          <small>— ${q.source || 'Unknown'}</small><br>
          <small>${q.date}</small>
          ${q.image ? `<img src="${q.image}" />` : ''}
        </div>
      `;
    });
  }

  function renderJournal() {
    const container = document.getElementById('journal');
    container.innerHTML = '';
    journal.forEach(j => {
      container.innerHTML += `
        <div class="card">
          <p>${j.text}</p>
          <small>${j.date}</small>
        </div>
      `;
    });
  }

  function addQuote() {
    const text = document.getElementById('quoteText').value;
    const source = document.getElementById('quoteSource').value;
    const image = document.getElementById('quoteImage').value;
    if (!text) return;

    quotes.unshift({
      text,
      source,
      image,
      date: new Date().toLocaleDateString()
    });

    localStorage.setItem('quotes', JSON.stringify(quotes));
    renderQuotes();
    document.getElementById('quoteText').value = '';
    document.getElementById('quoteSource').value = '';
    document.getElementById('quoteImage').value = '';
  }

  function addJournal() {
    const text = document.getElementById('journalText').value;
    if (!text) return;

    journal.unshift({
      text,
      date: new Date().toLocaleDateString()
    });

    localStorage.setItem('journal', JSON.stringify(journal));
    renderJournal();
    document.getElementById('journalText').value = '';
  }

  function showPopup() {
    const message = document.getElementById('popupInput').value;
    const popup = document.getElementById('popup');
    popup.innerText = message;
    popup.style.display = 'block';

    setTimeout(() => {
      popup.style.display = 'none';
    }, 3000);
  }

  renderQuotes();
  renderJournal();
</script>

</body>
</html>
