<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghibli Letter Shop</title>

<style>
body {
  margin:0;
  font-family: 'Georgia', serif;
  background: linear-gradient(to bottom, #87CEEB, #2c3e50);
  color:#fdf6e3;
}

/* FLOATING PARTICLES */
body::after {
  content:"";
  position:fixed;
  width:100%; height:100%;
  background-image: radial-gradient(#ffffff33 1px, transparent 1px);
  background-size: 40px 40px;
  animation: float 20s linear infinite;
  pointer-events:none;
}

@keyframes float {
  from {transform:translateY(0);} 
  to {transform:translateY(-200px);} 
}

/* INPUT */
textarea, input {
  width:100%;
  margin:6px 0;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#fff;
  color:#333;
}

button {
  background:#6ab04c;
  border:none;
  padding:8px 12px;
  cursor:pointer;
  border-radius:6px;
}

.delete-btn {
  background:#c0392b;
  color:white;
  font-size:10px;
  padding:4px 6px;
  position:absolute;
  top:5px;
  right:5px;
}

/* BOOKSHELF */
.bookshelf {
  background:#6b4f2a;
  padding:20px;
  border-radius:10px;
  box-shadow:inset 0 5px 10px rgba(0,0,0,0.5);
  margin-top:10px;
}

.shelf-row {
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

/* ENVELOPES */
.envelope {
  width:120px;
  height:80px;
  background:#f6d8a8;
  border-radius:8px;
  transform:rotate(-6deg);
  cursor:pointer;
  position:relative;
}

.envelope.full {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(1.6);
  width:420px; height:260px;
  z-index:999;
}

.flap {
  position:absolute;
  width:100%; height:50%;
  background:#e8c38c;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:.6s;
}

.envelope.open .flap { transform:rotateX(180deg); }

.letter {
  position:absolute;
  inset:10px;
  background:#fff8e7;
  padding:15px;
  opacity:0;
  overflow:auto;
}

.envelope.open .letter { opacity:1; }

/* NOTEBOOK */
.notebook {
  width:220px;
  height:140px;
  background:#7c5a3a;
  border-radius:6px;
  cursor:pointer;
  position:relative;
}

.notebook.full {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%) scale(1.2);
  width:650px; height:420px;
  background:#fff8e7;
  color:#333;
  padding:20px;
  overflow:auto;
  z-index:999;
}

.page {
  margin-bottom:15px;
  border-bottom:1px dashed #aaa;
  position:relative;
  padding-right:30px;
}

/* POPUP */
.popup {
  position:fixed;
  bottom:20px; right:20px;
  background:#fff8e7;
  color:#333;
  padding:15px;
  border-radius:12px;
  display:none;
}

</style>
</head>

<body>

<h2>✉️ Letters</h2>
<textarea id="quoteText" placeholder="Write your letter..."></textarea>
<input id="quoteSource" placeholder="Source">
<button onclick="addQuote()">Add Letter</button>

<div class="bookshelf">
  <div class="shelf-row" id="shelf"></div>
</div>

<h2>📓 Notebook</h2>
<div id="notebook" class="notebook" onclick="toggleNotebook()">📓</div>
<textarea id="journalInput" placeholder="Write your thoughts..."></textarea>
<button onclick="addJournal()">Save Entry</button>

<h2>⏳ Message</h2>
<input id="popupText" placeholder="Message">
<input type="datetime-local" id="popupTime">
<button onclick="schedulePopup()">Schedule</button>

<div class="popup" id="popupBox"></div>

<script>
let quotes = JSON.parse(localStorage.getItem('quotes') || '[]');
let journal = JSON.parse(localStorage.getItem('journal') || '[]');
let scheduled = JSON.parse(localStorage.getItem('scheduled') || '[]');
let openNB=false;

function saveData(){
  localStorage.setItem('quotes', JSON.stringify(quotes));
  localStorage.setItem('journal', JSON.stringify(journal));
  localStorage.setItem('scheduled', JSON.stringify(scheduled));
}

function renderQuotes(){
  const shelf=document.getElementById('shelf');
  shelf.innerHTML='';

  quotes.forEach((q,index)=>{
    const div=document.createElement('div');
    div.className='envelope';

    div.innerHTML=`
      <button class="delete-btn" onclick="deleteQuote(event, ${index})">X</button>
      <div class="flap"></div>
      <div class="letter">
        <p>${q.text}</p>
        <small>${q.source}</small>
      </div>
    `;

    div.onclick=()=>{
      div.classList.toggle('full');
      div.classList.toggle('open');
    };

    shelf.appendChild(div);
  });
}

function deleteQuote(event, index){
  event.stopPropagation();
  quotes.splice(index,1);
  saveData();
  renderQuotes();
}

function addQuote(){
  const text=document.getElementById('quoteText').value;
  const source=document.getElementById('quoteSource').value;
  if(!text) return;

  quotes.unshift({text, source, date:Date.now()});
  saveData();
  renderQuotes();

  quoteText.value='';
  quoteSource.value='';
}

function toggleNotebook(){
  const nb=document.getElementById('notebook');
  openNB=!openNB;
  nb.classList.toggle('full');
  renderJournal();
}

function addJournal(){
  const text=document.getElementById('journalInput').value;
  if(!text) return;

  journal.unshift({text, date:Date.now()});
  saveData();
  renderJournal();

  journalInput.value='';
}

function renderJournal(){
  const nb=document.getElementById('notebook');

  if(openNB){
    nb.innerHTML='';
    journal.forEach((j,index)=>{
      const div=document.createElement('div');
      div.className='page';
      div.innerHTML=`
        ${j.text}<br>
        <small>${new Date(j.date).toLocaleDateString()}</small>
        <button class="delete-btn" onclick="deleteJournal(event, ${index})">X</button>
      `;
      nb.appendChild(div);
    });
  } else {
    nb.innerHTML='📓';
  }
}

function deleteJournal(event, index){
  event.stopPropagation();
  journal.splice(index,1);
  saveData();
  renderJournal();
}

function schedulePopup(){
  const text=document.getElementById('popupText').value;
  const time=new Date(document.getElementById('popupTime').value).getTime();
  if(!text || !time) return;

  scheduled.push({text, time});
  saveData();
  alert('Message scheduled!');
}

function checkScheduled(){
  const now=Date.now();
  scheduled = scheduled.filter(item=>{
    if(item.time <= now){
      showPopup(item.text);
      return false;
    }
    return true;
  });
  saveData();
}

function showPopup(text){
  const box=document.getElementById('popupBox');
  box.innerText=text;
  box.style.display='block';
  setTimeout(()=>box.style.display='none',5000);
}

setInterval(checkScheduled, 1000);

renderQuotes();
renderJournal();
</script>

</body>
</html>
